name: model-router
version: 1.2.0
description: >
  Automatically routes ALL LLM calls to cheaper model tiers based on task
  complexity + semantic context tree. Main chat, sub-agents, internal calls
  (title gen, memory review, tool loops) all get routed. The context tree
  tracks files read/written, tool calls, and turn history to compute a
  semantic complexity floor that prevents mid-session downgrades.
  Enable with: hermes plugins enable model-router
author: local
hooks:
  - pre_llm_call
  - post_llm_call
  - on_session_start
  - on_tool_result
  - on_turn_start
  - on_turn_end
